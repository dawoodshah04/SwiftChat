services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: swiftchat-backend:latest
    container_name: swiftchat-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      PORT: 5001
      NODE_ENV: production
      # Set CLIENT_ORIGIN in .env to the frontend EC2 public IP, e.g.:
      # CLIENT_ORIGIN=http://13.234.56.78
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5001/api/auth/check', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s